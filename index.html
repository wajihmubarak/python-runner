<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تشغيل بايثون</title>

<style>
body {
    background: #0a0a0b;
    color: white;
    text-align: center;
    font-family: sans-serif;
}

h2 {
    margin-top: 20px;
}

textarea {
    width: 80%;
    height: 200px;
    background: #1f1f22;
    color: #0f0;
    border: none;
    padding: 10px;
    border-radius: 10px;
    outline: none;
}

button {
    padding: 10px 25px;
    background: gold;
    border: none;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
}

button:hover {
    background: #f1c40f;
}

pre {
    background: black;
    color: lime;
    padding: 10px;
    width: 80%;
    margin: auto;
    margin-top: 20px;
    border-radius: 10px;
    min-height: 50px;
}
</style>
</head>

<body>

<h2>🔥 شغل كود Python</h2>

<textarea id="code">
print("Hello Wajeeh 🔥")
</textarea>

<br>

<button onclick="runCode()">تشغيل</button>

<pre id="output"></pre>

<script>
function runCode(){
    fetch('/run', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            code: document.getElementById('code').value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('output').innerText = data.output;
    })
    .catch(err => {
        document.getElementById('output').innerText = "❌ خطأ في الاتصال بالسيرفر";
    });
}
</script>

</body>
</html>
